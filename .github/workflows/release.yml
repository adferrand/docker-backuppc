name: release

on:
  push:
    tags: ["4.*"]

jobs:
  main:
    uses: ./.github/workflows/main.yml
  docker:
    needs: main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build, tag and push to GHCR/DockerHub
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ghcr.io/adferrand/backuppc:${{ github.ref_name }}
            ghcr.io/adferrand/backuppc:4
            ghcr.io/adferrand/backuppc:latest
            docker.io/adferrand/backuppc:${{ github.ref_name }}
            docker.io/adferrand/backuppc:4
            docker.io/adferrand/backuppc:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
