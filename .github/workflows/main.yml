name: main

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3
        with:
          dockerfile: Dockerfile
      - name: Lint shell scripts
        run: shellcheck files/entrypoint.sh
      - name: Lint GitHub Actions workflows
        run: |
          curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          ./actionlint
      - name: Lint YAML files
        run: |
          pip install --quiet yamllint
          yamllint .github/ tests/goss.yaml
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build container image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: mjechow/backuppc
      - name: Save image artifact
        run: |
          mkdir -p dist
          docker save mjechow/backuppc | gzip -c -1 > dist/docker-backuppc.tar.gz
      - name: Upload container image as artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-image
          path: dist
  unit-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Download container image artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-image
      - name: Run unit tests
        run: |
          docker load < docker-backuppc.tar.gz
          mkdir -p ./bin
          curl -fsSL https://goss.rocks/install | GOSS_DST=./bin sh
          GOSS_PATH=./bin/goss GOSS_SLEEP=5 GOSS_FILES_PATH=./tests ./bin/dgoss run mjechow/backuppc
  scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download container image artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-image
      - name: Run Grype vulnerability scan
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype docker-archive:docker-backuppc.tar.gz --fail-on critical
  integration-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download container image artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-image
      - name: Run integration tests
        run: |
          docker load < docker-backuppc.tar.gz
          docker run --name backuppc-integration --detach -p 8080:8080 mjechow/backuppc
          sleep 5
          output="$(curl http://backuppc:password@localhost:8080/BackupPC_Admin)"
          echo "Expect the backupp configuration page without errors"
          grep "The servers PID is" <(echo $output)
          docker rm -f backuppc-integration
